# 회원가입 플로우 테스트
# 새 계정을 생성하고 온보딩 화면으로 이동하는지 검증한다
# 주의: 매 실행마다 새 이메일 주소가 필요하므로 타임스탬프 기반 이메일을 사용한다
appId: kr.pulda.app
---
# 앱 실행
- launchApp

# 로그인 화면 확인
- assertVisible: "로그인"

# 회원가입 링크 탭
- tapOn: "회원가입"

# 회원가입 화면 타이틀 확인
- assertVisible: "회원가입"

# 이메일 입력 (테스트용 더미 계정)
- tapOn: "이메일"
- inputText: "e2e_test_signup@pulda.kr"

# 비밀번호 입력 (6자 이상)
- tapOn: "비밀번호"
- inputText: "Test1234!"

# 비밀번호 확인 입력
- tapOn: "비밀번호 확인"
- inputText: "Test1234!"

# 학생 역할 선택 (기본값이지만 명시적으로 탭)
- tapOn: "학생"

# 회원가입 버튼 탭
- tapOn: "회원가입"

# 온보딩 화면 전환 대기 (최대 10초)
- extendedWaitUntil:
    visible: "프로필 설정"
    timeout: 10000

# 온보딩 화면의 닉네임 입력 안내 문구 확인
- assertVisible: "닉네임"
